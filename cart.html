<!DOCTYPE html>
<html>
<head>
    <title>Cart - Ladia Jewellery</title>
    <style>
        body {
            font-family: Arial;
            margin:0;
            background:#f5f5f5;
        }

        .navbar {
            background:black;
            color:white;
            padding:20px;
            text-align:center;
            font-size:28px;
	    font-weight:bold;
    	    letter-spacing:1px;
        }

        .container {
            padding:20px;
            text-align:center;
        }

        .cart-item {
            display:flex;
            align-items:center;
            justify-content:center;
            gap:15px;
            background:white;
            margin:10px auto;
            padding:10px;
            width:60%;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.2);
        }

        .cart-item img {
            width:80px;
            height:80px;
            object-fit:cover;
            border-radius:8px;
        }

        .empty {
            color:red;
            font-weight:bold;
        }

        button {
            margin-top:15px;
            padding:10px 15px;
            border:none;
            background:black;
            color:white;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover {
            background:#333;
        }
    </style>
</head>
<body onload="loadCart()">

<div class="navbar">
    🛒 Your Shopping Cart
</div>

<div class="container">
    <h2 id="count"></h2>
    <p id="total"></p>

    <div id="cartItems"></div>

    <button onclick="clearCart()">Clear Cart</button>
</div>

<script>
function loadCart() {
    let cart = JSON.parse(sessionStorage.getItem("cart") || "[]");
    let container = document.getElementById("cartItems");
    let count = document.getElementById("count");
    let total = document.getElementById("total");

    container.innerHTML = "";

    if (cart.length === 0) {
        container.innerHTML = "<p class='empty'>Your cart is empty</p>";
        count.innerText = "";
        total.innerText = "";
        return;
    }

    count.innerText = "Total Items: " + cart.length;

    let sum = 0;

    cart.forEach(item => {
        sum += item.price;

        let div = document.createElement("div");
        div.className = "cart-item";

        div.innerHTML = `
            <img src="${item.image}">
            <div>
                <p>${item.name}</p>
                <p>₹${item.price}</p>
            </div>
        `;

        container.appendChild(div);
    });

    total.innerText = "Total Cost: ₹" + sum;
}

function clearCart() {
    sessionStorage.removeItem("cart");
    loadCart();
}
</script>

</body>
</html>
